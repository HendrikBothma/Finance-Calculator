<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Finance Calculator</title>
</head>
<body>
    <h2>Finance Calculator Loaded!</h2>
    <p>Time: <span id="time"></span></p>
    <p>Deal ID: <span id="dealId">Loading...</span></p>
    
    <script>
        // Display current time
        document.getElementById('time').textContent = new Date().toLocaleTimeString();
        
        // Try to get Zoho CRM data
        if (typeof ZohoCRM !== 'undefined') {
            ZohoCRM.page.getViewedRecord(function(data) {
                if (data.code === 3000) {
                    document.getElementById('dealId').textContent = data.data.id;
                } else {
                    document.getElementById('dealId').textContent = 'Error: ' + data.message;
                }
            });
        } else {
            document.getElementById('dealId').textContent = 'ZohoCRM SDK not loaded';
        }
    </script>
</body>
</html>
