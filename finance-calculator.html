<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Finance Calculator</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; } .container { background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); width: 420px; overflow: hidden; } .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 20px 24px; text-align: center; } .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; } .header p { font-size: 12px; color: #a0aec0; margin-top: 4px; } .form-section { padding: 24px; } .form-group { margin-bottom: 16px; } .form-group label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; } .input-wrapper { position: relative; display: flex; align-items: center; } .input-prefix { position: absolute; left: 12px; font-size: 14px; color: #718096; font-weight: 600; } .input-suffix { position: absolute; right: 12px; font-size: 14px; color: #718096; font-weight: 600; } .form-group input { width: 100%; padding: 10px 36px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #2d3748; transition: border-color 0.2s; outline: none; background: #f7fafc; } .form-group input:focus { border-color: #667eea; background: #ffffff; } .btn-calculate { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; } .btn-calculate:hover { opacity: 0.9; } .results-section { background: #f7fafc; border-top: 2px solid #e2e8f0; padding: 20px 24px; display: none; } .results-section.visible { display: block; } .results-title { font-size: 13px; font-weight: 700; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; } .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e2e8f0; } .result-row:last-of-type { border-bottom: none; } .result-label { font-size: 13px; color: #718096; } .result-value { font-size: 14px; font-weight: 700; color: #2d3748; } .result-highlight { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; } .result-highlight .label { font-size: 13px; color: #a0aec0; } .result-highlight .value { font-size: 22px; font-weight: 700; color: #ffffff; } .btn-save { width: 100%; padding: 11px; background: #38a169; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 14px; transition: background 0.2s; } .btn-save:hover { background: #2f855a; } .save-status { text-align: center; font-size: 12px; margin-top: 8px; height: 16px; } .save-status.success { color: #38a169; } .save-status.error { color: #e53e3e; } </style> </head> <body> <div class="container"> <div class="header"> <h1>💼 Finance Calculator</h1> <p>Asset Finance Quotation Tool</p> </div> <div class="form-section"> <div class="form-group"> <label>Asset Value</label> <div class="input-wrapper"> <span class="input-prefix">R</span> <input type="number" id="assetValue" placeholder="0.00" /> </div> </div> <div class="form-group"> <label>Deposit</label> <div class="input-wrapper"> <span class="input-prefix">R</span> <input type="number" id="deposit" placeholder="0.00" /> </div> </div> <div class="form-group"> <label>Balloon Payment</label> <div class="input-wrapper"> <input type="number" id="balloon" placeholder="0" /> <span class="input-suffix">%</span> </div> </div> <div class="form-group"> <label>Interest Rate</label> <div class="input-wrapper"> <input type="number" id="interestRate" placeholder="0.00" /> <span class="input-suffix">%</span> </div> </div> <div class="form-group"> <label>Term</label> <div class="input-wrapper"> <input type="number" id="term" placeholder="0" /> <span class="input-suffix">mo</span> </div> </div> <button class="btn-calculate" onclick="calculate()">Calculate</button> </div> <div class="results-section" id="resultsSection"> <div class="result-highlight"> <span class="label">Monthly Instalment</span> <span class="value" id="monthlyPayment">R0.00</span> </div> <div class="results-title">Breakdown</div> <div class="result-row"> <span class="result-label">Financed Amount</span> <span class="result-value" id="financedAmount">R0.00</span> </div> <div class="result-row"> <span class="result-label">Balloon Amount</span> <span class="result-value" id="balloonAmount">R0.00</span> </div> <div class="result-row"> <span class="result-label">Total Repayment</span> <span class="result-value" id="totalRepayment">R0.00</span> </div> <div class="result-row"> <span class="result-label">Total Interest</span> <span class="result-value" id="totalInterest">R0.00</span> </div> <button class="btn-save" onclick="saveToZoho()">💾 Save to Deal</button> <div class="save-status" id="saveStatus"></div> </div> </div> <script src="https://js.zohostatic.com/zohocrm/sdk/2.0/zohocrmsdk.js"></script> <script> function fmt(n) { return 'R' + n.toLocaleString('en-ZA', {minimumFractionDigits: 2, maximumFractionDigits: 2}); } let calcResults = {}; function calculate() { const assetValue = parseFloat(document.getElementById('assetValue').value) || 0; const deposit = parseFloat(document.getElementById('deposit').value) || 0; const balloonPct = parseFloat(document.getElementById('balloon').value) || 0; const annualRate = parseFloat(document.getElementById('interestRate').value) || 0; const term = parseInt(document.getElementById('term').value) || 0; if (assetValue <= 0 || term <= 0 || annualRate <= 0) { alert('Please enter Asset Value, Interest Rate and Term.'); return; } const balloonAmount = assetValue * (balloonPct / 100); const financedAmount = assetValue - deposit; const monthlyRate = annualRate / 100 / 12; const pv = financedAmount - (balloonAmount / Math.pow(1 + monthlyRate, term)); let monthly; if (monthlyRate === 0) { monthly = pv / term; } else { monthly = (pv * monthlyRate * Math.pow(1 + monthlyRate, term)) / (Math.pow(1 + monthlyRate, term) - 1); } const totalRepayment = (monthly * term) + balloonAmount; const totalInterest = totalRepayment - financedAmount; calcResults = { assetValue: assetValue, deposit: deposit, balloonPct: balloonPct, balloonAmount: balloonAmount, financedAmount: financedAmount, interestRate: annualRate, term: term, monthlyPayment: monthly, totalRepayment: totalRepayment, totalInterest: totalInterest }; document.getElementById('monthlyPayment').textContent = fmt(monthly); document.getElementById('financedAmount').textContent = fmt(financedAmount); document.getElementById('balloonAmount').textContent = fmt(balloonAmount); document.getElementById('totalRepayment').textContent = fmt(totalRepayment); document.getElementById('totalInterest').textContent = fmt(totalInterest); document.getElementById('resultsSection').classList.add('visible'); } function saveToZoho() { if (!calcResults.monthlyPayment) { alert('Please calculate first.'); return; } const status = document.getElementById('saveStatus'); status.textContent = 'Saving...'; status.className = 'save-status'; ZOHO.CRM.API.getRecord({Entity: "Deals", RecordID: "{{dealId}}"}) .then(function(){ ZOHO.CRM.ACTION.setConfig({ "function_name": "sync_finance_to_sheet", "params": calcResults }).then(function(response){ status.textContent = '✅ Saved successfully!'; status.className = 'save-status success'; }).catch(function(){ status.textContent = '❌ Save failed. Try again.'; status.className = 'save-status error'; }); }); } ZOHO.embeddedApp.on("PageLoad", function(data) { // Widget loaded }); ZOHO.embeddedApp.init(); </script> </body> </html>
